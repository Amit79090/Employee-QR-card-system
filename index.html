<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Digital Card</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<script src="script.js" defer></script>

</head>

<body>

<div class="card">

<div class="top">

<img src="logo.png" class="logo">

<h1>MAITHON POWER LIMITED</h1>

<p>Employee Digital Identity Card</p>

</div>

<div class="photo">

<img id="photo" src="https://cdn-icons-png.flaticon.com/512/847/847969.png">

</div>

<div class="verified">

✔ Verified Employee

</div>

<div class="details">

<div class="item">
<span class="label">Employee Name</span>
<span id="name"></span>
</div>

<div class="item">
<span class="label">Employee ID</span>
<span id="id"></span>
</div>

<div class="item">
<span class="label">Department</span>
<span id="department"></span>
</div>

<div class="item">
<span class="label">Designation</span>
<span id="designation"></span>
</div>

<div class="item">
<span class="label">Blood Group</span>
<span id="bloodGroup"></span>
</div>

<div class="item">
<span class="label">Email</span>
<span id="email"></span>
</div>

<div class="item">
<span class="label">Mobile</span>
<span id="mobile"></span>
</div>

<div class="item">
<span class="label">Emergency</span>
<span id="emergency"></span>
</div>

</div>

<div class="footer">

Powered by Maithon Power Limited

</div>

</div>

</body>
</html>
