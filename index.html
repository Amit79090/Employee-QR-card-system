<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Maithon Power Digital ID Card</title>


<link rel="stylesheet" href="style.css">


<!-- Font Awesome Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


</head>


<body>


<div class="container">


<div class="card">


<!-- HEADER -->

<div class="header">


<img class="logo" src="images/logo.png">


<h1>Maithon Power Limited</h1>


<p>Digital Employee Identity Card</p>


</div>





<!-- PROFILE -->


<div class="profile">


<img id="photo" src="">


<h2 id="name"></h2>


<p id="designation"></p>

  
<span class="verified">

✔ Verified Employee

</span>


</div>






<!-- EMPLOYEE DETAILS -->


<div class="section">


<h3>

<i class="fa-solid fa-id-card"></i>

Employee Details

</h3>



<div class="info">



<div class="row">


<div class="left">

<i class="fa-solid fa-id-badge"></i>

Employee ID

</div>


<div class="right" id="id"></div>


</div>





<div class="row">


<div class="left">

<i class="fa-solid fa-building"></i>

Department

</div>


<div class="right" id="department"></div>


</div>





<div class="row">


<div class="left">

<i class="fa-solid fa-droplet"></i>

Blood Group

</div>


<div class="right">

<span class="blood" id="bloodGroup"></span>

</div>


</div>



</div>


</div>







<!-- CONTACT DETAILS -->


<div class="section">


<h3>

<i class="fa-solid fa-phone"></i>

Contact Details

</h3>



<div class="info">



<div class="row">


<div class="left">

<i class="fa-solid fa-envelope"></i>

Email

</div>


<div class="right" id="email"></div>


</div>






<div class="row">


<div class="left">

<i class="fa-solid fa-mobile-screen"></i>

Mobile

</div>


<div class="right" id="mobile"></div>


</div>






<div class="row emergency">


<div class="left">

<i class="fa-solid fa-triangle-exclamation"></i>

Emergency

</div>


<div class="right" id="emergency"></div>


</div>





</div>


</div>









<!-- BUTTONS -->


<div class="buttons">


<a id="callButton">


<i class="fa-solid fa-phone"></i>

Call


</a>




<a id="mailButton">


<i class="fa-solid fa-envelope"></i>

Email


</a>


</div>









<!-- FOOTER -->


<div class="footer">


<i class="fa-solid fa-shield-halved"></i>


QR Verified Employee


<br><br>


Powered by Maithon Power Limited



</div>





</div>


</div>







<script src="script.js"></script>


</body>


</html>
