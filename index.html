<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Employee Digital Identity Card</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<script src="script.js" defer></script>

</head>

<body>

<div class="container">

<div class="card">

<!-- ================= HEADER ================= -->

<div class="header">

<div class="company">

<img src="logo.png" class="logo">

<div>

<h1>MAITHON POWER LIMITED</h1>

<p>Employee Digital Identity Card</p>

</div>

</div>

</div>

<!-- ================= PROFILE ================= -->

<div class="profile">

<div class="photo">

<img id="photo"
src="https://cdn-icons-png.flaticon.com/512/847/847969.png">

</div>

<h2 id="name">Loading...</h2>

<p id="designation">Loading...</p>

<div class="verify">

<i class="fa-solid fa-circle-check"></i>

Verified Employee

</div>

</div>

<!-- ================= EMPLOYEE ================= -->

<div class="sectionTitle">

<i class="fa-solid fa-id-card"></i>

Employee Information

</div>

<div class="infoCard">

<div class="item">

<i class="fa-solid fa-id-badge"></i>

<div>

<label>Employee ID</label>

<span id="id"></span>

</div>

</div>

<div class="item">

<i class="fa-solid fa-building"></i>

<div>

<label>Department</label>

<span id="department"></span>

</div>

</div>

<div class="item">

<i class="fa-solid fa-briefcase"></i>

<div>

<label>Designation</label>

<span id="designation2"></span>

</div>

</div>

<div class="item">

<i class="fa-solid fa-droplet"></i>

<div>

<label>Blood Group</label>

<span id="bloodGroup"></span>

</div>

</div>

</div>

<!-- ================= CONTACT ================= -->

<div class="sectionTitle">

<i class="fa-solid fa-phone"></i>

Contact Details

</div>

<div class="infoCard">

<div class="item">

<i class="fa-solid fa-envelope"></i>

<div>

<label>Email</label>

<span id="email"></span>

</div>

</div>

<div class="item">

<i class="fa-solid fa-mobile-screen"></i>

<div>

<label>Mobile</label>

<span id="mobile"></span>

</div>

</div>

<div class="item emergency">

<i class="fa-solid fa-triangle-exclamation"></i>

<div>

<label>Emergency Contact</label>

<span id="emergency"></span>

</div>

</div>

</div>

<!-- ================= BUTTONS ================= -->

<div class="buttons">

<a id="callButton">

<i class="fa-solid fa-phone"></i>

Call

</a>

<a id="mailButton">

<i class="fa-solid fa-envelope"></i>

Email

</a>

<a id="whatsappButton">

<i class="fa-brands fa-whatsapp"></i>

WhatsApp

</a>

</div>

<!-- ================= FOOTER ================= -->

<div class="footer">

<i class="fa-solid fa-shield-halved"></i>

QR Verified Employee

<br>

Powered by Maithon Power Limited

</div>

</div>

</div>

</body>

</html>
