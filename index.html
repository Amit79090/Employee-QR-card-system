<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Card</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<div class="card">

<div class="header">
<h1>MAITHON POWER LIMITED</h1>
<p>Employee Information Card</p>
</div>

<div class="body">

<div class="row">
<label>Employee Name</label>
<span id="name"></span>
</div>

<div class="row">
<label>Employee ID</label>
<span id="id"></span>
</div>

<div class="row">
<label>Department</label>
<span id="department"></span>
</div>

<div class="row">
<label>Designation</label>
<span id="designation"></span>
</div>

<div class="row">
<label>Blood Group</label>
<span id="bloodGroup"></span>
</div>

<div class="row">
<label>Email</label>
<span id="email"></span>
</div>

<div class="row">
<label>Mobile</label>
<span id="mobile"></span>
</div>

<div class="row">
<label>Emergency Contact</label>
<span id="emergency"></span>
</div>

</div>

<div class="footer">

Powered by GitHub Pages

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
