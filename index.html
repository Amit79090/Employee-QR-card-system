<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Employee Digital ID Card</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<script src="script.js" defer></script>

</head>

<body>

<div class="container">

<div class="card">

<div class="header">

<img src="logo.png" class="logo">

<h1>MAITHON POWER LIMITED</h1>

<p>Employee Digital Identity Card</p>

</div>

<div class="profile">

<img id="photo"
src="https://cdn-icons-png.flaticon.com/512/847/847969.png">

<h2 id="name">Loading...</h2>

<p id="designation">Loading...</p>

<div class="verified">

<i class="fa-solid fa-circle-check"></i>

VERIFIED EMPLOYEE

</div>

</div>

<div class="section">

<h3>

<i class="fa-solid fa-id-card"></i>

Employee Information

</h3>

<div class="info">

<div class="row">

<div class="left">

<i class="fa-solid fa-id-badge"></i>

Employee ID

</div>

<div class="right" id="id"></div>

</div>

<div class="row">

<div class="left">

<i class="fa-solid fa-building"></i>

Department

</div>

<div class="right" id="department"></div>

</div>

<div class="row">

<div class="left">

<i class="fa-solid fa-briefcase"></i>

Designation

</div>

<div class="right" id="designation2"></div>

</div>

<div class="row">

<div class="left">

<i class="fa-solid fa-droplet"></i>

Blood Group

</div>

<div class="right" id="bloodGroup"></div>

</div>

</div>

</div>

<div class="section">

<h3>

<i class="fa-solid fa-phone"></i>

Contact Details

</h3>

<div class="info">

<div class="row">

<div class="left">

<i class="fa-solid fa-envelope"></i>

Email

</div>

<div class="right" id="email"></div>

</div>

<div class="row">

<div class="left">

<i class="fa-solid fa-mobile-screen"></i>

Mobile

</div>

<div class="right" id="mobile"></div>

</div>

<div class="row emergency">

<div class="left">

<i class="fa-solid fa-triangle-exclamation"></i>

Emergency

</div>

<div class="right" id="emergency"></div>

</div>

</div>

</div>

<div class="buttons">

<a id="callButton">

<i class="fa-solid fa-phone"></i>

Call

</a>

<a id="mailButton">

<i class="fa-solid fa-envelope"></i>

Email

</a>

</div>

<div class="footer">

<i class="fa-solid fa-shield-halved"></i>

QR Verified Employee

<br><br>

Powered by Maithon Power Limited

</div>

</div>

</div>

</body>

</html>
